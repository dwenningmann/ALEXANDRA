<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexandra | Professional Apply 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cv-font { font-family: 'Inter', sans-serif; }
        input, select, textarea { font-size: 16px !important; }
        .custom-shadow { box-shadow: 0 20px 60px rgba(0,0,0,0.07); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-[#f0f4f8] min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('cover'); // 'cover' or 'cv'
            const [image, setImage] = useState('alexandra.jpg');
            const fileInputRef = useRef(null);

            // Daten für das Anschreiben
            const [coverData, setCoverData] = useState({
                company: '', 
                studyProgram: 'BWL - Dienstleistungsmanagement', 
                salutation: 'Frau', 
                recruiterName: '',
                recruiterEmail: '',
                motivation: '', 
                startDate: '01.09.2026',
                source: 'Ihr Karriereportal',
                email: 'alexandra.orfanidou@icloud.com'
            });

            // Daten für den Lebenslauf (initial aus dem PDF übernommen)
            const [cvData, setCvData] = useState({
                profile: "Angehende Handelsfachwirtin (18 J.) mit ausgeprägter Service-Mentalität und operativer Erfahrung in der Steuerung von Verkaufsflächen. Fokus: Duales BWL-Studium 2026.",
                experience: [
                    {
                        period: "08/2025 – Heute",
                        role: "Auszubildende Handelsfachwirtin",
                        company: "Peek & Cloppenburg B.V. & Co. KG",
                        details: "Operative Steuerung Verkaufsbereich, Personaleinsatzplanung, Visual Merchandising & Trendanalyse."
                    },
                    {
                        period: "07/2025 – Heute",
                        role: "Servicekraft / Neukundenakquise (Minijob)",
                        company: "Top Sports Fitness",
                        details: "Kundenbetreuung, Vertragsberatung und aktive Akquise am Point of Sale."
                    }
                ],
                education: [
                    {
                        period: "2025",
                        degree: "Allgemeine Hochschulreife (Abitur)",
                        school: "Gymnasium Stuttgart Freiberg",
                        focus: "Naturwissenschaftlicher Schwerpunkt"
                    }
                ],
                skills: "Handelsbetriebslehre, MS Office, Warenwirtschaftssysteme, POS-Management",
                languages: "Deutsch (Muttersprache), Englisch (Verhandlungssicher), Griechisch (Gut), Französisch/Spanisch (Grundkenntnisse)"
            });

            const myInfo = { 
                name: "Alexandra Orfanidou", 
                address: "Langobardenstraße 2", 
                city: "70435 Stuttgart" 
            };

            const [output, setOutput] = useState(null);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const generateCover = () => {
                const greeting = coverData.recruiterName.trim() !== "" 
                    ? (coverData.salutation === 'Frau' ? `Sehr geehrte Frau ${coverData.recruiterName},` : `Sehr geehrter Herr ${coverData.recruiterName},`)
                    : "Sehr geehrte Damen und Herren,";

                const body = `${greeting}\n\nmit großem Interesse habe ich auf ${coverData.source} gelesen, dass Sie ein Duales Studium im Bereich ${coverData.studyProgram} zum ${coverData.startDate} anbieten. \n\nAktuell absolviere ich meine Ausbildung zur Handelsfachwirtin. Diese Zeit hat meine Leidenschaft für betriebswirtschaftliche Prozesse gefestigt. Mein Ziel ist es nun, dieses praktische Fundament durch ein wissenschaftliches Studium zu erweitern. \n\n${coverData.motivation ? 'Besonders spannend finde ich an Ihrem Haus, dass ' + coverData.motivation + '.\n\n' : ''}Ich freue mich sehr über die Einladung zu einem persönlichen Gespräch.\n\nMit freundlichen Grüßen\n\n${myInfo.name}`;
                
                setOutput({ subject: `Bewerbung: ${coverData.studyProgram}`, cleanBody: body });
                setActiveTab('cover');
            };

            return (
                <div className="max-w-[1400px] mx-auto p-4 lg:p-10 space-y-6">
                    
                    {/* TABS & TOOLS */}
                    <div className="flex justify-between items-center no-print">
                        <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                            <button onClick={() => setActiveTab('cover')} className={`px-6 py-2 rounded-xl font-bold text-sm transition-all ${activeTab === 'cover' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Anschreiben</button>
                            <button onClick={() => setActiveTab('cv')} className={`px-6 py-2 rounded-xl font-bold text-sm transition-all ${activeTab === 'cv' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Lebenslauf</button>
                        </div>
                        <button onClick={() => window.print()} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest active:scale-95 transition-all">Drucken / PDF</button>
                    </div>

                    <div className="grid lg:grid-cols-12 gap-8">
                        
                        {/* LEFT: EDITOR */}
                        <div className="lg:col-span-5 space-y-6 no-print">
                            <div className="bg-white p-8 rounded-[2.5rem] custom-shadow border border-slate-100">
                                <h1 className="text-2xl font-black text-slate-900 mb-6 uppercase tracking-tighter">Editor</h1>
                                
                                <div className="space-y-4">
                                    <div onClick={() => fileInputRef.current.click()} className="h-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center cursor-pointer overflow-hidden transition-all hover:border-indigo-300">
                                        {image ? <img src={image} className="w-full h-full object-cover" /> : <p className="text-[10px] font-black text-slate-400">Foto hochladen</p>}
                                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
                                    </div>

                                    {activeTab === 'cover' ? (
                                        <div className="space-y-3 animate-in slide-in-from-left-4 duration-300">
                                            <input placeholder="Firma" value={coverData.company} onChange={e => setCoverData({...coverData, company: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold" />
                                            <input placeholder="Ansprechpartner Nachname" value={coverData.recruiterName} onChange={e => setCoverData({...coverData, recruiterName: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none" />
                                            <textarea placeholder="Individuelle Motivation..." value={coverData.motivation} onChange={e => setCoverData({...coverData, motivation: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none h-24 text-sm" />
                                            <button onClick={generateCover} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Vorschau generieren</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-3 animate-in slide-in-from-right-4 duration-300">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">Profil-Slogan</p>
                                            <textarea value={cvData.profile} onChange={e => setCvData({...cvData, profile: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm h-20" />
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">Kenntnisse</p>
                                            <input value={cvData.skills} onChange={e => setCvData({...cvData, skills: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" />
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* RIGHT: PREVIEW (PAPER) */}
                        <div className="lg:col-span-7">
                            <div className="bg-white p-12 md:p-16 shadow-2xl rounded-sm min-h-[1000px] border border-slate-100 flex flex-col cv-font">
                                
                                {activeTab === 'cover' ? (
                                    <div className="flex-1">
                                        <div className="flex justify-between mb-16">
                                            <div>
                                                <h2 className="text-2xl font-bold text-slate-900 uppercase tracking-tighter">{myInfo.name}</h2>
                                                <p className="text-slate-500 text-sm">{myInfo.address} | {myInfo.city}</p>
                                                <p className="text-indigo-600 text-sm font-semibold">{coverData.email}</p>
                                            </div>
                                            <div className="w-24 h-28 bg-slate-100 rounded-lg overflow-hidden border-2 border-white shadow-md">
                                                <img src={image} className="w-full h-full object-cover" />
                                            </div>
                                        </div>
                                        <div className="text-sm text-slate-400 mb-8 uppercase font-bold tracking-widest">Bewerbung um ein Duales Studium</div>
                                        <div className="whitespace-pre-line text-slate-700 leading-relaxed text-[11pt]">
                                            {output ? output.cleanBody : "Bitte Editor ausfüllen und 'Vorschau generieren' klicken."}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 space-y-10 animate-in fade-in duration-700">
                                        {/* CV HEADER */}
                                        <div className="flex gap-8 items-center border-b pb-8 border-slate-100">
                                            <div className="w-32 h-40 bg-slate-200 rounded-2xl overflow-hidden shrink-0 shadow-inner">
                                                <img src={image} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="space-y-2">
                                                <h1 className="text-4xl font-black text-slate-900 tracking-tighter uppercase">{myInfo.name}</h1>
                                                <p className="text-indigo-600 font-bold uppercase tracking-widest text-xs">Curriculum Vitae</p>
                                                <p className="text-slate-500 text-sm leading-relaxed max-w-md italic">"{cvData.profile}"</p>
                                            </div>
                                        </div>

                                        {/* CV SECTIONS */}
                                        <div className="grid grid-cols-3 gap-10">
                                            <div className="col-span-1 space-y-8 border-r border-slate-50 pr-6">
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Kontakt</h3>
                                                    <div className="text-xs space-y-2 text-slate-600">
                                                        <p>📍 {myInfo.city}</p>
                                                        <p>📧 {coverData.email}</p>
                                                        <p>📱 +49 176 70863859</p>
                                                    </div>
                                                </section>
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Skills</h3>
                                                    <p className="text-xs text-slate-600 leading-relaxed">{cvData.skills}</p>
                                                </section>
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Sprachen</h3>
                                                    <p className="text-xs text-slate-600 leading-relaxed">{cvData.languages}</p>
                                                </section>
                                            </div>

                                            <div className="col-span-2 space-y-8">
                                                <section>
                                                    <h3 className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                                                        <span className="w-8 h-[1px] bg-indigo-100"></span> Berufserfahrung
                                                    </h3>
                                                    <div className="space-y-6">
                                                        {cvData.experience.map((exp, i) => (
                                                            <div key={i} className="relative pl-4 border-l-2 border-slate-50">
                                                                <p className="text-[9px] font-bold text-slate-400">{exp.period}</p>
                                                                <p className="font-bold text-slate-800 text-sm">{exp.role}</p>
                                                                <p className="text-xs text-indigo-600 mb-1">{exp.company}</p>
                                                                <p className="text-xs text-slate-500 leading-relaxed">{exp.details}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>

                                                <section>
                                                    <h3 className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                                                        <span className="w-8 h-[1px] bg-indigo-100"></span> Ausbildung
                                                    </h3>
                                                    <div className="space-y-6">
                                                        {cvData.education.map((edu, i) => (
                                                            <div key={i} className="pl-4 border-l-2 border-slate-50">
                                                                <p className="text-[9px] font-bold text-slate-400">{edu.period}</p>
                                                                <p className="font-bold text-slate-800 text-sm">{edu.degree}</p>
                                                                <p className="text-xs text-slate-500">{edu.school} | {edu.focus}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
