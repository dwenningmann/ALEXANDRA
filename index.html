<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexandra | Professional Apply 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cv-font { font-family: 'Inter', sans-serif; }
        input, select, textarea { font-size: 14px !important; }
        .custom-shadow { box-shadow: 0 20px 60px rgba(0,0,0,0.07); }
        @media print { .no-print { display: none; } body { background: white; } .print-p-0 { padding: 0 !important; } }
    </style>
</head>
<body class="bg-[#f0f4f8] min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('cover');
            const [image, setImage] = useState('alexandra.jpg');
            const fileInputRef = useRef(null);

            // Stammdaten & Kontakt (Zentralisiert)
            const [personalInfo, setPersonalInfo] = useState({
                name: "Alexandra Orfanidou",
                jobTitle: "Auszubildende Handelsfachwirtin",
                address: "Langobardenstraße 2",
                city: "70435 Stuttgart",
                email: "alexandra.orfanidou@icloud.com",
                phone: "+49 176 70863859",
                birthDate: "18.03.2007",
                birthPlace: "Stuttgart",
                nationality: "Deutsch, Griechisch"
            });

            // Anschreiben Daten
            const [coverData, setCoverData] = useState({
                company: '', 
                studyProgram: 'BWL - Dienstleistungsmanagement', 
                salutation: 'Frau', 
                recruiterName: '',
                source: 'Ihr Karriereportal',
                startDate: '01.09.2026',
                motivation: ''
            });

            // Lebenslauf Daten
            const [cvData, setCvData] = useState({
                profile: "Angehende Handelsfachwirtin mit ausgeprägter Service-Mentalität und operativer Erfahrung in der Steuerung von Verkaufsflächen. Hohe Lernbereitschaft und Kommunikationsstärke.",
                experience: [
                    {
                        period: "08/2025 – Heute",
                        role: "Auszubildende Handelsfachwirtin",
                        company: "Peek & Cloppenburg B.V. & Co. KG, Düsseldorf - Stuttgart",
                        details: "Operative Steuerung des Verkaufsbereichs, Personaleinsatzplanung, Visual Merchandising unter Berücksichtigung von Trendanalysen."
                    },
                    {
                        period: "07/2025 – Heute",
                        role: "Servicekraft / Neukundenakquise (Minijob)",
                        company: "Top Sports Fitness, Kornwestheim",
                        details: "Professionelle Kundenbetreuung, Vertragsberatung und aktive Neukundenakquise am Empfang."
                    }
                ],
                education: [
                    {
                        period: "2025",
                        degree: "Allgemeine Hochschulreife (Abitur)",
                        school: "Gymnasium Stuttgart Freiberg",
                        focus: "Naturwissenschaftlicher Schwerpunkt (Biologie, Chemie, Physik)"
                    }
                ],
                skills: "Handelsbetriebslehre, Projektsteuerung, Visual Merchandising, Personaleinsatzplanung",
                languages: "Deutsch (Muttersprache), Englisch (Verhandlungssicher), Griechisch (Gut), Französisch/Spanisch (Grundkenntnisse)"
            });

            const [output, setOutput] = useState(null);

            const generateCover = () => {
                const greeting = coverData.recruiterName.trim() !== "" 
                    ? (coverData.salutation === 'Frau' ? `Sehr geehrte Frau ${coverData.recruiterName},` : `Sehr geehrter Herr ${coverData.recruiterName},`)
                    : "Sehr geehrte Damen und Herren,";

                const body = `${greeting}\n\nmit großem Interesse habe ich auf ${coverData.source} gelesen, dass Sie ein Duales Studium im Bereich ${coverData.studyProgram} zum ${coverData.startDate} anbieten. Da ich Theorie und Praxis auf höchstem Niveau verbinden möchte, bewerbe ich mich hiermit bei Ihnen.\n\nAktuell absolviere ich meine Ausbildung zur Handelsfachwirtin. Diese Zeit hat meine Leidenschaft für betriebswirtschaftliche Prozesse gefestigt und mir gezeigt, dass ich Verantwortung übernehmen möchte. Mein Ziel ist es nun, dieses praktische Fundament durch ein wissenschaftliches Studium ab dem Herbst 2026 zu erweitern.\n\nDer Wechsel in ein Studium ist für mich der nächste logische Schritt. Ich möchte die Hintergründe verstehen und aktiv mitgestalten. ${coverData.motivation ? coverData.motivation + ' ' : ''}Ich bin bereit, Vollgas zu geben und mein kaufmännisches Vorwissen direkt in Ihr Team zu transferieren.\n\nIch freue mich sehr über die Einladung zu einem persönlichen Gespräch.\n\nMit freundlichen Grüßen\n\n${personalInfo.name}`;
                
                setOutput({ subject: `Bewerbung: ${coverData.studyProgram}`, cleanBody: body });
                setActiveTab('cover');
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="max-w-[1400px] mx-auto p-4 lg:p-10 space-y-6 print-p-0">
                    
                    {/* NAV */}
                    <div className="flex justify-between items-center no-print">
                        <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                            <button onClick={() => setActiveTab('cover')} className={`px-6 py-2 rounded-xl font-bold text-sm transition-all ${activeTab === 'cover' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Anschreiben</button>
                            <button onClick={() => setActiveTab('cv')} className={`px-6 py-2 rounded-xl font-bold text-sm transition-all ${activeTab === 'cv' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Lebenslauf</button>
                        </div>
                        <button onClick={() => window.print()} className="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest active:scale-95 transition-all shadow-lg">PDF Erstellen</button>
                    </div>

                    <div className="grid lg:grid-cols-12 gap-8">
                        
                        {/* EDITOR (LINKS) */}
                        <div className="lg:col-span-4 space-y-6 no-print">
                            <div className="bg-white p-6 rounded-[2rem] custom-shadow border border-slate-100 sticky top-10">
                                <h2 className="text-xl font-black text-slate-900 mb-6 uppercase tracking-tighter">Daten-Zentrale</h2>
                                
                                <div className="space-y-4 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                                    <div onClick={() => fileInputRef.current.click()} className="h-24 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center cursor-pointer overflow-hidden transition-all hover:border-indigo-300">
                                        {image ? <img src={image} className="w-full h-full object-cover" /> : <p className="text-[10px] font-black text-slate-400">FOTO</p>}
                                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
                                    </div>

                                    {/* Gemeinsame Stammdaten */}
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase ml-1">Stammdaten</p>
                                        <input placeholder="Name" value={personalInfo.name} onChange={e => setPersonalInfo({...personalInfo, name: e.target.value})} className="w-full p-2 bg-slate-50 rounded-lg outline-none" />
                                        <div className="grid grid-cols-2 gap-2">
                                            <input placeholder="Geburtsdatum" value={personalInfo.birthDate} onChange={e => setPersonalInfo({...personalInfo, birthDate: e.target.value})} className="p-2 bg-slate-50 rounded-lg outline-none" />
                                            <input placeholder="Nationalität" value={personalInfo.nationality} onChange={e => setPersonalInfo({...personalInfo, nationality: e.target.value})} className="p-2 bg-slate-50 rounded-lg outline-none" />
                                        </div>
                                    </div>

                                    {activeTab === 'cover' ? (
                                        <div className="space-y-3 pt-4 border-t border-slate-100">
                                            <p className="text-[10px] font-bold text-indigo-600 uppercase ml-1">Anschreiben Details</p>
                                            <input placeholder="Firma" value={coverData.company} onChange={e => setCoverData({...coverData, company: e.target.value})} className="w-full p-2 bg-slate-50 rounded-lg outline-none font-bold" />
                                            <input placeholder="Ansprechpartner" value={coverData.recruiterName} onChange={e => setCoverData({...coverData, recruiterName: e.target.value})} className="w-full p-2 bg-slate-50 rounded-lg outline-none" />
                                            <textarea placeholder="Individueller Zusatz (Motivation)..." value={coverData.motivation} onChange={e => setCoverData({...coverData, motivation: e.target.value})} className="w-full p-2 bg-slate-50 rounded-lg outline-none h-20 text-xs" />
                                            <button onClick={generateCover} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-black uppercase text-xs tracking-widest shadow-lg">Vorschau Aktualisieren</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-3 pt-4 border-t border-slate-100">
                                            <p className="text-[10px] font-bold text-indigo-600 uppercase ml-1">CV Anpassung</p>
                                            <textarea value={cvData.profile} onChange={e => setCvData({...cvData, profile: e.target.value})} className="w-full p-2 bg-slate-50 rounded-lg outline-none text-xs h-20" />
                                            <textarea value={cvData.skills} onChange={e => setCvData({...cvData, skills: e.target.value})} className="w-full p-2 bg-slate-50 rounded-lg outline-none text-xs h-16" />
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* PREVIEW (RECHTS) */}
                        <div className="lg:col-span-8">
                            <div className="bg-white p-12 md:p-16 shadow-2xl rounded-sm min-h-[1050px] flex flex-col cv-font border border-slate-100 relative overflow-hidden">
                                
                                {activeTab === 'cover' ? (
                                    <div className="flex-1">
                                        {/* HEADER COVER */}
                                        <div className="flex justify-between mb-20">
                                            <div className="space-y-1">
                                                <h2 className="text-xl font-black text-slate-900 uppercase tracking-tighter">{personalInfo.name}</h2>
                                                <p className="text-slate-500 text-sm">{personalInfo.address} | {personalInfo.city}</p>
                                                <p className="text-indigo-600 text-sm font-bold">{personalInfo.email}</p>
                                                <p className="text-slate-400 text-xs">{personalInfo.phone}</p>
                                            </div>
                                            <div className="w-24 h-32 bg-slate-50 rounded-xl overflow-hidden shadow-md border-4 border-white -rotate-1">
                                                <img src={image} className="w-full h-full object-cover" />
                                            </div>
                                        </div>

                                        <div className="mb-12">
                                            <p className="text-xs font-bold text-indigo-600 uppercase tracking-[0.2em] mb-2">Bewerbung für 2026</p>
                                            <h3 className="text-xl font-black text-slate-900 uppercase italic">Duales Studium: {coverData.studyProgram}</h3>
                                        </div>

                                        <div className="whitespace-pre-line text-slate-700 leading-relaxed text-[11pt] antialiased">
                                            {output ? output.cleanBody : "Klicken Sie auf 'Vorschau Aktualisieren', um das Anschreiben zu generieren."}
                                        </div>
                                        
                                        <div className="mt-20 pt-10 border-t border-slate-50">
                                            <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest italic">Alexandra Orfanidou // Professional Apply Box</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 space-y-10">
                                        {/* CV HEADER */}
                                        <div className="flex gap-10 items-start border-b pb-10 border-slate-100">
                                            <div className="w-32 h-44 bg-slate-200 rounded-2xl overflow-hidden shrink-0 shadow-lg border-4 border-white rotate-1">
                                                <img src={image} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="space-y-3">
                                                <h1 className="text-4xl font-black text-slate-900 tracking-tighter uppercase">{personalInfo.name}</h1>
                                                <p className="text-indigo-600 font-black uppercase tracking-[0.3em] text-xs">Curriculum Vitae</p>
                                                <p className="text-slate-500 text-sm leading-relaxed max-w-lg italic">"{cvData.profile}"</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-3 gap-12">
                                            {/* CV SIDEBAR */}
                                            <div className="col-span-1 space-y-8">
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Persönliches</h3>
                                                    <div className="text-xs space-y-3 text-slate-600">
                                                        <div><p className="text-[9px] font-bold text-slate-300 uppercase">Geburtsdaten</p><p>{personalInfo.birthDate} in {personalInfo.birthPlace}</p></div>
                                                        <div><p className="text-[9px] font-bold text-slate-300 uppercase">Nationalität</p><p>{personalInfo.nationality}</p></div>
                                                        <div><p className="text-[9px] font-bold text-slate-300 uppercase">Wohnort</p><p>{personalInfo.city}</p></div>
                                                    </div>
                                                </section>
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Kontakt</h3>
                                                    <div className="text-xs space-y-2 text-slate-600">
                                                        <p className="font-bold text-indigo-600">{personalInfo.email}</p>
                                                        <p>{personalInfo.phone}</p>
                                                    </div>
                                                </section>
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Expertise</h3>
                                                    <p className="text-xs text-slate-600 leading-relaxed font-medium">{cvData.skills}</p>
                                                </section>
                                                <section>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Sprachen</h3>
                                                    <p className="text-xs text-slate-600 leading-relaxed">{cvData.languages}</p>
                                                </section>
                                            </div>

                                            {/* CV CONTENT */}
                                            <div className="col-span-2 space-y-10">
                                                <section>
                                                    <h3 className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-6 flex items-center gap-3">
                                                        Berufsweg <span className="flex-1 h-[1px] bg-indigo-50"></span>
                                                    </h3>
                                                    <div className="space-y-8">
                                                        {cvData.experience.map((exp, i) => (
                                                            <div key={i} className="relative pl-5 border-l-2 border-slate-100">
                                                                <div className="absolute w-2 h-2 bg-indigo-600 rounded-full -left-[5px] top-1"></div>
                                                                <p className="text-[9px] font-bold text-slate-400 uppercase mb-1">{exp.period}</p>
                                                                <p className="font-black text-slate-800 text-sm uppercase tracking-tight">{exp.role}</p>
                                                                <p className="text-xs text-indigo-600 font-bold mb-2">{exp.company}</p>
                                                                <p className="text-xs text-slate-500 leading-relaxed">{exp.details}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>

                                                <section>
                                                    <h3 className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-6 flex items-center gap-3">
                                                        Ausbildung <span className="flex-1 h-[1px] bg-indigo-50"></span>
                                                    </h3>
                                                    <div className="space-y-8">
                                                        {cvData.education.map((edu, i) => (
                                                            <div key={i} className="pl-5 border-l-2 border-slate-100">
                                                                <p className="text-[9px] font-bold text-slate-400 uppercase mb-1">{edu.period}</p>
                                                                <p className="font-black text-slate-800 text-sm uppercase tracking-tight">{edu.degree}</p>
                                                                <p className="text-xs text-slate-500 font-medium">{edu.school}</p>
                                                                <p className="text-[10px] text-slate-400 italic mt-1">{edu.focus}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
